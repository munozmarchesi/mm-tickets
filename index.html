<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM · Sistema de Gestión</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F5F7;--surface:#fff;--border:#E2E4EA;
  --text:#1A1D2E;--muted:#6B7280;--hint:#9CA3AF;
  --accent:#3B5BDB;--accent-bg:#EEF2FF;
  --rojo:#DC2626;--rojo-bg:#FEF2F2;--rojo-dot:#EF4444;
  --naranja:#C2410C;--naranja-bg:#FFF7ED;--naranja-dot:#F97316;
  --amarillo:#92400E;--amarillo-bg:#FFFBEB;--amarillo-dot:#D97706;
  --verde:#166534;--verde-bg:#F0FDF4;--verde-dot:#16A34A;
  --r:8px;--rl:12px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1120px;margin:0 auto;padding:20px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.hdr h1{font-size:18px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.tab-btn{padding:7px 18px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s}
.btn:hover{background:var(--bg)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover:not(:disabled){background:#2f4ec4;border-color:#2f4ec4}
.btn-danger{background:var(--rojo-bg);color:var(--rojo);border-color:#FCA5A5}
.btn-sm{padding:5px 10px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.stat-sub{font-size:11px;color:var(--hint);margin-top:3px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filters input,.filters select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--accent)}
.filters input{flex:1;min-width:160px}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.thead{display:grid;grid-template-columns:140px 1fr 95px 100px 110px;padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.trow{display:grid;grid-template-columns:140px 1fr 95px 100px 110px;padding:11px 14px;border-bottom:1px solid var(--border);align-items:start;cursor:pointer;transition:background .1s}
.trow:last-child{border-bottom:none}
.trow:hover{background:#FAFBFC}
.trow.exp{background:var(--accent-bg)}
.trow.venc{border-left:3px solid var(--rojo-dot)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rojo{background:var(--rojo-bg);color:var(--rojo)}.rojo .dot{background:var(--rojo-dot)}
.naranja{background:var(--naranja-bg);color:var(--naranja)}.naranja .dot{background:var(--naranja-dot)}
.amarillo{background:var(--amarillo-bg);color:var(--amarillo)}.amarillo .dot{background:var(--amarillo-dot)}
.verde{background:var(--verde-bg);color:var(--verde)}.verde .dot{background:var(--verde-dot)}
.tid{font-family:monospace;font-size:10px;color:var(--muted);margin-bottom:4px}
.tdesc{font-size:13px;line-height:1.4}
.tarea{font-size:11px;color:var(--muted);margin-top:3px}
.estado-pill{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg);display:inline-block}
.dl{font-size:11px}.dl.v{color:var(--rojo);font-weight:500}.dl.h{color:var(--naranja);font-weight:500}
.resp{font-size:12px;color:var(--muted)}
.detail{padding:14px;border-bottom:1px solid var(--border);background:#F0F4FF;font-size:13px;line-height:1.65}
.detail .nbox{padding:8px 10px;background:var(--surface);border-radius:var(--r);border-left:3px solid var(--accent);color:var(--muted);margin-top:8px}
.meta-row{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;font-size:11px;color:var(--hint)}
.capture-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:16px}
.capture-box textarea{width:100%;min-height:130px;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);resize:vertical;line-height:1.65;transition:border .12s}
.capture-box textarea:focus{outline:none;border-color:var(--accent)}
.capture-box textarea::placeholder{color:var(--hint)}
.cap-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.rec-ind{display:none;align-items:center;gap:6px;font-size:13px;color:var(--rojo);font-weight:500}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--rojo);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.out-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.out-card h3{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tix-out{border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;border-left-width:3px}
.tix-out:last-child{margin-bottom:0}
.tsv-pre{font-family:monospace;font-size:10px;background:var(--bg);border-radius:4px;padding:8px;word-break:break-all;margin-top:8px;color:var(--hint);line-height:1.5;max-height:52px;overflow:hidden;cursor:pointer}
.ev-row{display:flex;gap:12px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.setup-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:32px;max-width:480px;margin:50px auto;text-align:center}
.setup-wrap h2{font-size:18px;font-weight:600;margin-bottom:8px}
.setup-wrap p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.65}
.setup-steps{text-align:left;background:var(--bg);border-radius:var(--r);padding:14px;margin-bottom:20px;font-size:13px;color:var(--muted);line-height:1.9}
.setup-steps strong{color:var(--text)}
.setup-wrap input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--text);margin-bottom:10px}
.setup-wrap input:focus{outline:none;border-color:var(--accent)}
.center{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--r);padding:10px 14px;color:var(--rojo);font-size:13px;margin-bottom:12px}
.ok{background:var(--verde-bg);border:1px solid #86EFAC;border-radius:var(--r);padding:10px 14px;color:var(--verde);font-size:13px;margin-bottom:12px}
.info-bar{background:var(--accent-bg);border:1px solid #BAC8FF;border-radius:var(--r);padding:10px 14px;color:var(--accent);font-size:12px;margin-bottom:14px}
.footer{text-align:center;font-size:11px;color:var(--hint);margin-top:20px;padding-bottom:4px}
@media(max-width:700px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .thead{display:none}
  .trow{grid-template-columns:1fr;gap:5px}
  .filters input{min-width:140px}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <h1>MM · Sistema de Gestión</h1>
      <div class="hdr-sub" id="hdr-sub"></div>
    </div>
    <nav class="tabs">
      <button id="tb-tickets" class="tab-btn active" onclick="switchTab('tickets')">📋 Tickets</button>
      <button id="tb-bandeja" class="tab-btn" onclick="switchTab('bandeja')">📥 Bandeja</button>
    </nav>
  </div>
  <div id="view-tickets"></div>
  <div id="view-bandeja" style="display:none"></div>
  <div class="footer">Muñoz Marchesi · Sistema de Gestión Operativa</div>
</div>
<script>
const LS={url:'mm_url',data:'mm_cache',ts:'mm_ts',tab:'mm_tab',lastId:'mm_lastid',apikey:'mm_apikey'};
const TORD={Rojo:0,Naranja:1,Amarillo:2,Verde:3};
const TCLS={Rojo:'rojo',Naranja:'naranja',Amarillo:'amarillo',Verde:'verde'};
const TCOL={Rojo:'var(--rojo-dot)',Naranja:'var(--naranja-dot)',Amarillo:'var(--amarillo-dot)',Verde:'var(--verde-dot)'};
const ECOL={Abierto:'#DC2626','En curso':'#185FA5',Esperando:'#BA7517',Cerrado:'#639922',Descartado:'#888780'};
const TSV_FORMULA='=SI(INDIRECTO("L"&FILA())="Cerrado";INDIRECTO("M"&FILA())-INDIRECTO("B"&FILA());HOY()-INDIRECTO("B"&FILA()))';
let tickets=[],expanded=null,isRecording=false,recognition=null,pendingImg=null;
let F={search:'',triage:'all',estado:'activos',resp:'all'};
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayStr=()=>{const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;};
function parseDate(s){if(!s||!String(s).match(/\d{2}\/\d{2}\/\d{4}/))return null;const[d,m,y]=String(s).split('/');return new Date(+y,+m-1,+d);}
function todayD(){const d=new Date();d.setHours(0,0,0,0);return d;}
function diffD(d){return Math.round((d-todayD())/86400000);}
function dlInfo(dl){const d=parseDate(dl);if(!d)return{lbl:'',cls:''};const diff=diffD(d);if(diff<0)return{lbl:`Venció hace ${-diff}d`,cls:'v'};if(diff===0)return{lbl:'HOY',cls:'h'};if(diff===1)return{lbl:'Mañana',cls:''};return{lbl:dl,cls:''};}

/* ---- TABS ---- */
function switchTab(tab){
  localStorage.setItem(LS.tab,tab);
  ['tickets','bandeja'].forEach(t=>{
    $('view-'+t).style.display=t===tab?'block':'none';
    $('tb-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='bandeja')renderBandeja();
}

/* ---- TICKETS ---- */
function filteredTickets(){
  const s=F.search.toLowerCase();
  return tickets.filter(t=>{
    if(F.estado==='activos'&&['Cerrado','Descartado'].includes(t.estado))return false;
    if(F.estado!=='activos'&&F.estado!=='all'&&t.estado!==F.estado)return false;
    if(F.triage!=='all'&&t.triage!==F.triage)return false;
    if(F.resp!=='all'&&t.responsable!==F.resp)return false;
    if(s&&![t.id,t.descripcion,t.deQuien,t.area,t.responsable].some(x=>(x||'').toLowerCase().includes(s)))return false;
    return true;
  }).sort((a,b)=>{
    const ta=TORD[a.triage]??9,tb=TORD[b.triage]??9;
    if(ta!==tb)return ta-tb;
    const da=parseDate(a.deadline),db=parseDate(b.deadline);
    if(da&&db)return da-db;if(da)return -1;if(db)return 1;return 0;
  });
}

function renderTickets(loading=false,error=''){
  const v=$('view-tickets');
  const act=tickets.filter(t=>!['Cerrado','Descartado'].includes(t.estado));
  const st={act:act.length,total:tickets.length,rojo:act.filter(t=>t.triage==='Rojo').length,venc:act.filter(t=>{const d=parseDate(t.deadline);return d&&d<todayD();}).length,hoy:act.filter(t=>{const d=parseDate(t.deadline);return d&&diffD(d)===0;}).length};
  const resps=[...new Set(tickets.map(t=>t.responsable).filter(Boolean))].sort();
  const list=filteredTickets();
  const ts=localStorage.getItem(LS.ts)||'';
  v.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap">
  <p style="font-size:12px;color:var(--muted)">${ts?'Actualizado: '+ts:''} · ${tickets.length} tickets</p>
  <div style="display:flex;gap:6px">
    <button class="btn btn-sm" onclick="renderSetupTickets()">⚙</button>
    <button class="btn btn-sm" onclick="loadTickets()" ${loading?'disabled':''}>
      ${loading?'<span class="spin"></span>':''} ↻ Actualizar
    </button>
  </div>
</div>
${tickets.length>0?`<div class="stats">
  <div class="stat"><div class="stat-lbl">Activos</div><div class="stat-val">${st.act}</div><div class="stat-sub">de ${st.total}</div></div>
  <div class="stat"><div class="stat-lbl">🔴 Rojos</div><div class="stat-val" style="color:${st.rojo>0?'var(--rojo)':'inherit'}">${st.rojo}</div><div class="stat-sub">urgentes hoy</div></div>
  <div class="stat"><div class="stat-lbl">Vencidos</div><div class="stat-val" style="color:${st.venc>0?'var(--rojo)':'inherit'}">${st.venc}</div><div class="stat-sub">${st.venc>0?'requieren acción':'al día ✓'}</div></div>
  <div class="stat"><div class="stat-lbl">Hoy</div><div class="stat-val">${st.hoy}</div><div class="stat-sub">deadline hoy</div></div>
</div>`:''}
${error?`<div class="err">⚠ ${esc(error)}</div>`:''}
${tickets.length>0?`<div class="filters">
  <input type="text" placeholder="Buscar ID, descripción, área..." value="${F.search}" oninput="F.search=this.value;renderTickets()">
  <select onchange="F.triage=this.value;renderTickets()">
    <option value="all" ${F.triage==='all'?'selected':''}>Todo triage</option>
    <option value="Rojo" ${F.triage==='Rojo'?'selected':''}>🔴 Rojo</option>
    <option value="Naranja" ${F.triage==='Naranja'?'selected':''}>🟠 Naranja</option>
    <option value="Amarillo" ${F.triage==='Amarillo'?'selected':''}>🟡 Amarillo</option>
    <option value="Verde" ${F.triage==='Verde'?'selected':''}>🟢 Verde</option>
  </select>
  <select onchange="F.estado=this.value;renderTickets()">
    <option value="activos" ${F.estado==='activos'?'selected':''}>Solo activos</option>
    <option value="all" ${F.estado==='all'?'selected':''}>Todos</option>
    <option value="Abierto">Abierto</option><option value="En curso">En curso</option>
    <option value="Esperando">Esperando</option><option value="Cerrado">Cerrado</option>
  </select>
  <select onchange="F.resp=this.value;renderTickets()">
    <option value="all">Todos los responsables</option>
    ${resps.map(r=>`<option value="${esc(r)}" ${F.resp===r?'selected':''}>${esc(r)}</option>`).join('')}
  </select>
</div>
<p style="font-size:11px;color:var(--hint);margin-bottom:8px">${list.length} tickets · clic para ver detalle</p>
<div class="twrap">
  <div class="thead"><span>ID · Triage</span><span>Descripción</span><span>Estado</span><span>Deadline</span><span>Responsable</span></div>
  ${list.length===0?'<div class="center">Sin tickets con estos filtros.</div>':list.map(t=>{
    const tc=TCLS[t.triage]||'naranja',dl=dlInfo(t.deadline),isE=expanded===t.id,isV=dl.cls==='v';
    return`<div class="trow${isE?' exp':''}${isV?' venc':''}" onclick="tog('${t.id}')">
  <div><div class="tid">${esc(t.id)}</div><span class="badge ${tc}"><span class="dot"></span>${esc(t.triage)}</span></div>
  <div><div class="tdesc">${esc(t.descripcion)}</div><div class="tarea">${esc(t.area)}${t.deQuien?' · '+esc(t.deQuien):''}</div></div>
  <div><span class="estado-pill" style="color:${ECOL[t.estado]||'var(--muted)'}">${esc(t.estado)}</span></div>
  <div><span class="dl ${dl.cls}">${esc(dl.lbl)}</span></div>
  <div class="resp">${esc(t.responsable)}</div>
</div>${isE?`<div class="detail">
  <p>${esc(t.descripcion)}</p>
  ${t.notas?`<div class="nbox">${esc(t.notas)}</div>`:''}
  <div class="meta-row">
    <span>📅 ${esc(t.fecha)}</span><span>📂 ${esc(t.categoria)}</span>
    <span>📥 ${esc(t.origen)}</span><span>👤 ${esc(t.deQuien)}</span>
    ${t.fechaCierre?`<span>✅ ${esc(t.fechaCierre)}</span>`:''}
  </div>
</div>`:''}`;
  }).join('')}
</div>`:`<div class="center" style="padding:60px 20px">
  <div style="font-size:36px;margin-bottom:12px">📋</div>
  <p style="margin-bottom:16px;font-size:14px">Conectá con Google Sheets para ver los tickets</p>
  <button class="btn btn-primary" onclick="renderSetupTickets()">Configurar →</button>
</div>`}`;
}

function renderSetupTickets(){
  $('view-tickets').innerHTML=`<div class="setup-wrap">
  <div style="font-size:36px;margin-bottom:12px">📋</div>
  <h2>Conectar Tickets</h2>
  <p>Pegá la URL de tu Google Apps Script (termina en /exec)</p>
  <div class="setup-steps">
    1. Abrí <strong>script.google.com</strong><br>
    2. Proyecto <strong>MM-Tickets-API</strong><br>
    3. <strong>Desplegar → Administrar implementaciones</strong><br>
    4. Copiá la URL que termina en <strong>/exec</strong>
  </div>
  <input type="url" id="url-in" placeholder="https://script.google.com/macros/s/.../exec" value="${localStorage.getItem(LS.url)||''}">
  <button class="btn btn-primary" onclick="saveUrl()" style="width:100%;justify-content:center;margin-bottom:8px">Conectar →</button>
  ${tickets.length>0?`<button class="btn btn-sm" onclick="renderTickets()" style="width:100%;justify-content:center">Cancelar</button>`:''}
</div>`;
}

function saveUrl(){const u=($('url-in').value||'').trim();if(!u.includes('script.google.com')){alert('URL inválida');return;}localStorage.setItem(LS.url,u);loadTickets();}
function tog(id){expanded=expanded===id?null:id;renderTickets();}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb='mm'+Date.now();
    window[cb]=data=>{delete window[cb];document.head.removeChild(s);ok(data);};
    const s=document.createElement('script');
    s.onerror=()=>{delete window[cb];fail(new Error('Error de red'));};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.head.appendChild(s);
  });
}

async function loadTickets(){
  const url=localStorage.getItem(LS.url);
  if(!url){renderSetupTickets();return;}
  renderTickets(true);
  try{
    const data=await jsonp(url);
    if(!data.ok)throw new Error(data.error||'Error en el script');
    tickets=data.tickets||[];
    const now=new Date().toLocaleString('es-AR');
    localStorage.setItem(LS.ts,now);
    localStorage.setItem(LS.data,JSON.stringify(tickets));
    if(tickets.length>0){
      const last=tickets[tickets.length-1].id;
      localStorage.setItem(LS.lastId,last);
      $('hdr-sub').textContent=`Último ticket: ${last}`;
    }
    renderTickets();
  }catch(e){
    const cache=localStorage.getItem(LS.data);
    if(cache){tickets=JSON.parse(cache);renderTickets(false,`Error: ${e.message}. Mostrando datos guardados.`);}
    else renderTickets(false,`No se pudo conectar: ${e.message}`);
  }
}

function initTickets(){
  const cache=localStorage.getItem(LS.data);
  if(cache){tickets=JSON.parse(cache);if(tickets.length>0)$('hdr-sub').textContent=`Último ticket: ${tickets[tickets.length-1].id}`;}
  const url=localStorage.getItem(LS.url);
  if(!url){renderSetupTickets();}else{renderTickets(true);loadTickets();}
}

/* ---- BANDEJA ---- */
function makeTSV(t){
  return[t.id,todayStr(),t.hora||'',t.origen||'Dictado',t.deQuien||'',t.area||'',t.categoria||'Otro',t.descripcion,t.triage,t.responsable||'',t.deadline||'','Abierto','',TSV_FORMULA,''].join('\t');
}

function nextId(lastId){
  if(!lastId||!lastId.match(/^TKT-\d{6}-\d+$/)){const now=new Date();return`TKT-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}-???`;}
  const parts=lastId.split('-');const n=parseInt(parts[2])+1;return`TKT-${parts[1]}-${String(n).padStart(3,'0')}`;
}

function renderBandeja(){
  const v=$('view-bandeja');
  const apikey=localStorage.getItem(LS.apikey)||'';
  const lastId=localStorage.getItem(LS.lastId)||'';
  const hasSpeech=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  v.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
  <p style="font-size:13px;font-weight:500">Bandeja de entrada</p>
  <button class="btn btn-sm" onclick="renderBandejaSetup()">⚙ API Key</button>
</div>
${!apikey?`<div class="err">⚠ API Key de Anthropic no configurada. <a href="#" onclick="renderBandejaSetup();return false" style="color:var(--rojo);font-weight:500">Configurar →</a></div>`:''}
<div class="capture-box">
  <textarea id="cap-text" placeholder="Dictá o escribí lo que pasó — reuniones, llamadas, novedades, decisiones, pedidos recibidos. Claude va a extraer los tickets y eventos automáticamente."></textarea>
  <div id="img-preview" style="display:none;margin-top:8px;padding:8px 10px;background:var(--accent-bg);border-radius:var(--r);font-size:12px;color:var(--accent)"></div>
  <div class="cap-actions">
    ${hasSpeech?`<button class="btn" id="mic-btn" onclick="toggleMic()">🎙 Dictar</button>`:`<span style="font-size:12px;color:var(--hint)">🎙 Solo Chrome</span>`}
    <button class="btn" onclick="$('img-in').click()">📷 Foto / Imagen</button>
    <input type="file" id="img-in" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
    <div class="rec-ind" id="rec-ind"><span class="rec-dot"></span>Grabando...</div>
    <button class="btn btn-sm" onclick="clearCapture()" style="margin-left:auto">🗑 Limpiar</button>
  </div>
</div>
<div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap">
  <div style="flex:1;min-width:180px">
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Último ID registrado</label>
    <input type="text" id="lid-in" value="${esc(lastId)}" placeholder="TKT-202605-119"
      style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:monospace;color:var(--text);background:var(--surface)"
      onchange="localStorage.setItem('mm_lastid',this.value)">
  </div>
  <button class="btn btn-primary" onclick="procesar()" id="proc-btn" ${!apikey?'disabled':''} style="white-space:nowrap">
    ⚡ Procesar con Claude →
  </button>
</div>
<div id="b-output"></div>`;
}

function renderBandejaSetup(){
  $('view-bandeja').innerHTML=`<div class="setup-wrap">
  <div style="font-size:36px;margin-bottom:12px">🔑</div>
  <h2>API Key de Anthropic</h2>
  <p>La clave se guarda solo en este dispositivo. Se usa para que Claude procese el texto y genere los tickets.</p>
  <div class="setup-steps">
    1. Abrí <strong>console.anthropic.com</strong><br>
    2. Iniciá sesión (o creá cuenta gratis)<br>
    3. Andá a <strong>API Keys → Create Key</strong><br>
    4. Copiá la clave — empieza con <strong>sk-ant-</strong>
  </div>
  <input type="password" id="key-in" placeholder="sk-ant-api03-..." value="${localStorage.getItem(LS.apikey)||''}">
  <button class="btn btn-primary" onclick="saveApiKey()" style="width:100%;justify-content:center;margin-bottom:8px">Guardar →</button>
  <button class="btn btn-sm" onclick="renderBandeja()" style="width:100%;justify-content:center">Cancelar</button>
</div>`;
}

function saveApiKey(){const k=($('key-in').value||'').trim();if(!k.startsWith('sk-ant-')){alert('La clave debe empezar con sk-ant-');return;}localStorage.setItem(LS.apikey,k);renderBandeja();}
function clearCapture(){$('cap-text').value='';pendingImg=null;const p=$('img-preview');if(p)p.style.display='none';}

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
  if(isRecording){recognition.stop();return;}
  recognition=new SR();recognition.lang='es-AR';recognition.continuous=true;recognition.interimResults=true;
  let base=$('cap-text').value;
  recognition.onresult=e=>{
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';else int+=e.results[i][0].transcript;}
    base+=fin;$('cap-text').value=base+int;
  };
  recognition.onstart=()=>{isRecording=true;const b=$('mic-btn');if(b){b.textContent='⏹ Detener';b.classList.add('btn-danger');}$('rec-ind').style.display='flex';};
  recognition.onend=()=>{isRecording=false;const b=$('mic-btn');if(b){b.textContent='🎙 Dictar';b.classList.remove('btn-danger');}$('rec-ind').style.display='none';};
  recognition.start();
}

function handleImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImg={data:e.target.result.split(',')[1],type:file.type};
    const p=$('img-preview');if(p){p.textContent=`📷 Imagen adjunta: ${file.name} (${Math.round(file.size/1024)}KB)`;p.style.display='block';}
  };
  reader.readAsDataURL(file);
}

async function procesar(){
  const text=($('cap-text').value||'').trim();
  if(!text&&!pendingImg){alert('Escribí, dictá o adjuntá una imagen primero.');return;}
  const apikey=localStorage.getItem(LS.apikey);
  if(!apikey){renderBandejaSetup();return;}
  const lastId=($('lid-in').value||'').trim()||localStorage.getItem(LS.lastId)||'';
  const next=nextId(lastId);
  const out=$('b-output');
  out.innerHTML=`<div class="center"><span class="spin"></span>Claude está analizando el input...</div>`;
  $('proc-btn').disabled=true;
  const sys=`Sos el asistente operativo de Muñoz Marchesi, empresa retail multisucursal argentina.
HOY: ${todayStr()}. PRÓXIMO ID TICKET: ${next}.
Analizá el input del gerente y devolvé ÚNICAMENTE JSON válido sin texto adicional ni bloques markdown:
{"resumen":"1-2 oraciones","tickets":[{"id":"TKT-YYYYMM-NNN","triage":"Rojo|Naranja|Amarillo|Verde","descripcion":"acción clara y delegable","area":"sigla sucursal o área","deQuien":"quién trae el input","responsable":"quién resuelve","deadline":"DD/MM/YYYY o vacío","categoria":"Procedimiento|Decisión|Seguimiento|RRHH|Logística|Comercial|Otro","origen":"WhatsApp|Mail|Llamada|Reunión|Dictado|Otro","hora":"HH:MM o vacío"}],"eventos":[{"titulo":"","fecha":"DD/MM/YYYY","hora":"HH:MM o vacío","descripcion":"","allDay":false}],"notas":"observaciones sin acción concreta"}
TRIAGE: Rojo=hoy urgente, Naranja=esta semana, Amarillo=derivar, Verde=descartar.
CREAR TICKET SOLO SI: hay acción concreta delegable, tiene deadline, hay consecuencia operativa, o es input externo que requiere respuesta. NO crear ticket para insights — esos van a "notas".
PERSONAS CLAVE: Marco(gerente), Daniela(socia), Gisela(RRHH), Matías(RRHH), Beto(cajas), Lorena(stock), Karen(informes/promos), Walter(eCommerce), Casimiro(logística), Fito/Diego Fillon(soporte operativo), Fabricio(OyL Créditos), Paola(control calidad post-venta).
SUCURSALES: VAN PYR, VAN DC, VAN SHW, VAN MZ, RSP1, RSP2, RSP3, GPD, GPD MZ, CST, GSM, SBR, SBR MZ, RCA DC, RCA MZ, CDG, SSY, VMT, HCP, GCD, QML, CHR, LBR, CRZ, CLR, LFT, TIS, QTL, VBT, LTG, LCT, PIN.
Si hay múltiples acciones en el input, generá un ticket por cada una (si cumple criterios). Usá IDs correlativos desde ${next}.`;
  try{
    const msgs=[];
    if(pendingImg){
      msgs.push({role:'user',content:[{type:'image',source:{type:'base64',media_type:pendingImg.type,data:pendingImg.data}},{type:'text',text:text||'Procesá esta imagen y extraé la información operativa relevante.'}]});
    }else{
      msgs.push({role:'user',content:text});
    }
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apikey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sys,messages:msgs})
    });
    if(!resp.ok){const er=await resp.json().catch(()=>({}));throw new Error(er.error?.message||`HTTP ${resp.status}`);}
    const data=await resp.json();
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const parsed=JSON.parse(clean);
    if(parsed.tickets?.length>0){
      const last=parsed.tickets[parsed.tickets.length-1].id;
      localStorage.setItem(LS.lastId,last);
      if($('lid-in'))$('lid-in').value=last;
      $('hdr-sub').textContent=`Último ticket: ${last}`;
    }
    pendingImg=null;
    renderOutput(parsed);
  }catch(e){
    out.innerHTML=`<div class="err">⚠ ${esc(e.message)}<br><small style="opacity:.75">Verificá la API Key en console.anthropic.com o que tengas crédito disponible.</small></div>`;
  }finally{
    if($('proc-btn'))$('proc-btn').disabled=false;
  }
}

function renderOutput(data){
  const{resumen='',tickets:tix=[],eventos=[],notas=''}=data;
  const out=$('b-output');
  window._tsvs=tix.map(t=>makeTSV(t));
  out.innerHTML=`
<div class="out-card">
  <h3>📋 Resumen</h3>
  <p style="font-size:14px;line-height:1.65">${esc(resumen)}</p>
  <p style="font-size:12px;color:var(--hint);margin-top:8px">${tix.length} ticket${tix.length!==1?'s':''} · ${eventos.length} evento${eventos.length!==1?'s':''} · ${notas?'notas adicionales':'sin notas adicionales'}</p>
</div>
${tix.length>0?`<div class="out-card">
  <h3>🎫 Tickets — listos para pegar en el Sheet</h3>
  ${tix.map((t,i)=>{
    const tsv=window._tsvs[i];
    const col=TCOL[t.triage]||TCOL.Naranja;
    const tc=TCLS[t.triage]||'naranja';
    return`<div class="tix-out" style="border-left-color:${col}">
  <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;flex-wrap:wrap">
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <span class="badge ${tc}"><span class="dot"></span>${esc(t.triage)}</span>
        <code style="font-size:10px;color:var(--muted)">${esc(t.id)}</code>
        ${t.deadline?`<span style="font-size:11px;color:var(--muted)">📅 ${esc(t.deadline)}</span>`:''}
      </div>
      <p style="font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px">${esc(t.descripcion)}</p>
      <p style="font-size:12px;color:var(--muted)">${[t.area,t.deQuien,t.responsable?'→ '+t.responsable:''].filter(Boolean).join(' · ')}</p>
    </div>
    <button class="btn btn-sm" id="cbtn-${i}" onclick="copyOne(${i})">📋 Copiar</button>
  </div>
  <div class="tsv-pre" title="Clic para copiar">${esc(tsv)}</div>
</div>`;
  }).join('')}
  ${tix.length>1?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
    <button class="btn btn-primary btn-sm" onclick="copyAll()">📋 Copiar TODOS (${tix.length} filas) → ir al Sheet y Ctrl+V</button>
  </div>`:''}
</div>`:''}
${eventos.length>0?`<div class="out-card">
  <h3>📅 Eventos detectados</h3>
  ${eventos.map(e=>`<div class="ev-row">
  <div style="min-width:90px;font-size:12px;color:var(--muted)"><strong>${esc(e.fecha)}</strong><br>${esc(e.hora)||'Todo el día'}</div>
  <div style="flex:1">
    <p style="font-size:13px;font-weight:500">${esc(e.titulo)}</p>
    ${e.descripcion?`<p style="font-size:12px;color:var(--muted);margin-top:2px">${esc(e.descripcion)}</p>`:''}
  </div>
</div>`).join('')}
  <p style="font-size:11px;color:var(--hint);margin-top:10px">Decile a Claude en el chat que cree estos eventos en Calendar.</p>
</div>`:''}
${notas?`<div class="out-card">
  <h3>📝 Notas / Observaciones</h3>
  <p style="font-size:13px;line-height:1.65;color:var(--muted)">${esc(notas)}</p>
  <p style="font-size:11px;color:var(--hint);margin-top:8px">Estas observaciones no generan ticket — van a las notas del frente correspondiente.</p>
</div>`:''}
<div style="text-align:center;margin-top:8px">
  <button class="btn btn-sm" onclick="clearCapture();$('b-output').innerHTML=''">↩ Nueva captura</button>
</div>`;
}

function copyOne(i){
  navigator.clipboard.writeText(window._tsvs[i]).then(()=>{
    const b=$('cbtn-'+i);if(!b)return;
    b.textContent='✓ Copiado';setTimeout(()=>b.textContent='📋 Copiar',2000);
  });
}

function copyAll(){
  navigator.clipboard.writeText(window._tsvs.join('\n')).then(()=>{
    alert(`✓ ${window._tsvs.length} filas copiadas.\nAndá al Sheet, hacé clic al final de la última fila y pegá (Ctrl+V).`);
  });
}

/* ---- INIT ---- */
window.onload=()=>{
  const cache=localStorage.getItem(LS.data);
  if(cache){tickets=JSON.parse(cache);if(tickets.length>0)$('hdr-sub').textContent=`Último ticket: ${tickets[tickets.length-1].id}`;}
  const lastTab=localStorage.getItem(LS.tab)||'tickets';
  if(lastTab==='bandeja'){
    $('view-tickets').style.display='none';$('view-bandeja').style.display='block';
    $('tb-tickets').classList.remove('active');$('tb-bandeja').classList.add('active');
    renderBandeja();
    const url=localStorage.getItem(LS.url);if(url)loadTickets().catch(()=>{});
  }else{initTickets();}
};
</script>
