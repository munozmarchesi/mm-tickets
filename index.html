<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM · Tickets</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F5F7;--surface:#fff;--border:#E2E4EA;
  --text:#1A1D2E;--muted:#6B7280;--hint:#9CA3AF;
  --accent:#3B5BDB;--accent-bg:#EEF2FF;
  --rojo:#DC2626;--rojo-bg:#FEF2F2;--rojo-dot:#EF4444;
  --naranja:#C2410C;--naranja-bg:#FFF7ED;--naranja-dot:#F97316;
  --amarillo:#92400E;--amarillo-bg:#FFFBEB;--amarillo-dot:#D97706;
  --verde:#166534;--verde-bg:#F0FDF4;--verde-dot:#16A34A;
  --r:8px;--rl:12px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1120px;margin:0 auto;padding:24px 20px}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.hdr p{font-size:12px;color:var(--muted);margin-top:3px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .12s}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.9;background:var(--accent)}

/* Setup */
.setup{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:40px 32px;max-width:520px;margin:80px auto;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.setup-icon{font-size:40px;margin-bottom:16px}
.setup h2{font-size:18px;font-weight:600;margin-bottom:8px}
.setup .desc{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.65}
.setup input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--text);margin-bottom:10px;transition:border .12s}
.setup input:focus{outline:none;border-color:var(--accent)}
.setup .hint{font-size:11px;color:var(--hint);margin-top:10px}
.setup-step{text-align:left;background:var(--bg);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--muted);line-height:1.7}
.setup-step strong{color:var(--text)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:26px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--hint);margin-top:4px}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters input,.filters select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
.filters input{flex:1;min-width:180px}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--accent)}

/* Table */
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.thead{display:grid;grid-template-columns:140px 1fr 95px 100px 105px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.trow{display:grid;grid-template-columns:140px 1fr 95px 100px 105px;padding:11px 14px;border-bottom:1px solid var(--border);align-items:start;cursor:pointer;transition:background .1s}
.trow:last-child{border-bottom:none}
.trow:hover{background:#FAFBFC}
.trow.exp{background:var(--accent-bg)}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rojo{background:var(--rojo-bg);color:var(--rojo)}.rojo .dot{background:var(--rojo-dot)}
.naranja{background:var(--naranja-bg);color:var(--naranja)}.naranja .dot{background:var(--naranja-dot)}
.amarillo{background:var(--amarillo-bg);color:var(--amarillo)}.amarillo .dot{background:var(--amarillo-dot)}
.verde{background:var(--verde-bg);color:var(--verde)}.verde .dot{background:var(--verde-dot)}

.tid{font-family:'SF Mono',Consolas,monospace;font-size:10px;color:var(--muted);margin-bottom:5px}
.tdesc{font-size:13px;line-height:1.4}
.tarea{font-size:11px;color:var(--muted);margin-top:3px}
.estado{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg);display:inline-block}
.dl{font-size:11px}.dl.v{color:var(--rojo);font-weight:500}.dl.h{color:var(--naranja);font-weight:500}
.resp{font-size:12px;color:var(--muted)}

/* Detail */
.detail{padding:14px;border-bottom:1px solid var(--border);background:#F0F4FF;font-size:13px;line-height:1.65}
.detail p{margin-bottom:6px}
.detail .nbox{padding:8px 10px;background:var(--surface);border-radius:var(--r);border-left:3px solid var(--accent);color:var(--muted);margin-top:6px}
.meta-row{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;font-size:11px;color:var(--hint)}

/* States */
.center{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--r);padding:12px 14px;color:var(--rojo);font-size:13px;margin-bottom:16px}
.info{background:var(--accent-bg);border:1px solid #BAC8FF;border-radius:var(--r);padding:10px 14px;color:var(--accent);font-size:12px;margin-bottom:14px}
.footer{text-align:center;font-size:11px;color:var(--hint);margin-top:18px;padding-bottom:8px}

/* Alert vencido */
.trow.venc{border-left:3px solid var(--rojo-dot)}

@media(max-width:700px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .thead{display:none}
  .trow{grid-template-columns:1fr;gap:5px}
  .filters input{min-width:140px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const LS_URL="mm_url",LS_DATA="mm_cache",LS_TS="mm_ts";
let tickets=[],expanded=null;
let F={search:"",triage:"all",estado:"activos",resp:"all"};

const g=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function parseDate(s){
  if(!s||!String(s).match(/\d{2}\/\d{2}\/\d{4}/))return null;
  const[d,m,y]=String(s).split("/");return new Date(+y,+m-1,+d);
}
function todayD(){const d=new Date();d.setHours(0,0,0,0);return d;}
function diffD(d){return Math.round((d-todayD())/86400000);}
function dlInfo(dl){
  const d=parseDate(dl);if(!d)return{lbl:"",cls:""};
  const diff=diffD(d);
  if(diff<0)return{lbl:`Venció hace ${-diff}d`,cls:"v"};
  if(diff===0)return{lbl:"Vence HOY",cls:"h"};
  if(diff===1)return{lbl:"Mañana",cls:""};
  return{lbl:dl,cls:""};
}
function tcls(t){return({Rojo:"rojo",Naranja:"naranja",Amarillo:"amarillo",Verde:"verde"})[t]||"naranja";}
const TORD={Rojo:0,Naranja:1,Amarillo:2,Verde:3};

function filtered(){
  const s=F.search.toLowerCase();
  return tickets.filter(t=>{
    if(F.estado==="activos"&&["Cerrado","Descartado"].includes(t.estado))return false;
    if(F.estado!=="activos"&&F.estado!=="all"&&t.estado!==F.estado)return false;
    if(F.triage!=="all"&&t.triage!==F.triage)return false;
    if(F.resp!=="all"&&t.responsable!==F.resp)return false;
    if(s&&![t.id,t.descripcion,t.deQuien,t.area,t.responsable].some(x=>(x||"").toLowerCase().includes(s)))return false;
    return true;
  }).sort((a,b)=>{
    const ta=TORD[a.triage]??9,tb=TORD[b.triage]??9;
    if(ta!==tb)return ta-tb;
    const da=parseDate(a.deadline),db=parseDate(b.deadline);
    if(da&&db)return da-db;
    if(da)return -1;if(db)return 1;return 0;
  });
}

function ST(){
  const act=tickets.filter(t=>!["Cerrado","Descartado"].includes(t.estado));
  return{
    total:tickets.length,
    act:act.length,
    rojo:act.filter(t=>t.triage==="Rojo").length,
    venc:act.filter(t=>{const d=parseDate(t.deadline);return d&&d<todayD();}).length,
    hoy:act.filter(t=>{const d=parseDate(t.deadline);return d&&diffD(d)===0;}).length
  };
}

function renderSetup(){
  g("app").innerHTML=`
<div class="setup">
  <div class="setup-icon">📋</div>
  <h2>Conectar con Muñoz Marchesi</h2>
  <p class="desc">Para activar el dashboard, pegá la URL de tu Google Apps Script.<br>La encontrás en el Paso 1 de las instrucciones.</p>
  <div class="setup-step">
    <strong>Cómo obtener la URL:</strong><br>
    1. Abrí <strong>script.google.com</strong> e iniciá sesión con tu Google<br>
    2. Abrí el proyecto <strong>MM-Tickets-API</strong><br>
    3. Hacé clic en <strong>Desplegar → Administrar implementaciones</strong><br>
    4. Copiá la URL que termina en <strong>/exec</strong>
  </div>
  <input type="url" id="uIn" placeholder="https://script.google.com/macros/s/.../exec" value="${localStorage.getItem(LS_URL)||""}">
  <button class="btn btn-primary" onclick="connect()" style="width:100%;justify-content:center">Conectar y cargar →</button>
  <p class="hint">🔒 La URL se guarda solo en este dispositivo. No se envía a ningún servidor externo.</p>
</div>`;
}

function renderDash(loading=false,error="",info=""){
  const st=ST();
  const resps=[...new Set(tickets.map(t=>t.responsable).filter(Boolean))].sort();
  const list=filtered();
  const ts=localStorage.getItem(LS_TS)||"";

  g("app").innerHTML=`
<div class="hdr">
  <div>
    <h1>MM · Gestión de Tickets</h1>
    <p>${ts?"Actualizado: "+ts:""} · ${tickets.length} tickets cargados</p>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="renderSetup()" style="font-size:12px">⚙ Configurar</button>
    <button class="btn" onclick="load()" ${loading?"disabled":""}>${loading?"Cargando…":"↻ Actualizar"}</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-lbl">Activos</div><div class="stat-val">${st.act}</div><div class="stat-sub">de ${st.total} total</div></div>
  <div class="stat"><div class="stat-lbl">🔴 Rojos</div><div class="stat-val" style="color:${st.rojo>0?"var(--rojo)":"inherit"}">${st.rojo}</div><div class="stat-sub">urgentes hoy</div></div>
  <div class="stat"><div class="stat-lbl">Vencidos</div><div class="stat-val" style="color:${st.venc>0?"var(--rojo)":"inherit"}">${st.venc}</div><div class="stat-sub">${st.venc>0?"requieren acción":"al día ✓"}</div></div>
  <div class="stat"><div class="stat-lbl">Vencen hoy</div><div class="stat-val">${st.hoy}</div><div class="stat-sub">deadline hoy</div></div>
</div>

${error?`<div class="err">⚠ ${esc(error)}</div>`:""}
${info?`<div class="info">ℹ ${esc(info)}</div>`:""}

<div class="filters">
  <input type="text" placeholder="Buscar ID, descripción, área, persona…" value="${F.search}" oninput="F.search=this.value;renderDash()">
  <select onchange="F.triage=this.value;renderDash()">
    <option value="all" ${F.triage==="all"?"selected":""}>Todos los triage</option>
    <option value="Rojo" ${F.triage==="Rojo"?"selected":""}>🔴 Rojo</option>
    <option value="Naranja" ${F.triage==="Naranja"?"selected":""}>🟠 Naranja</option>
    <option value="Amarillo" ${F.triage==="Amarillo"?"selected":""}>🟡 Amarillo</option>
    <option value="Verde" ${F.triage==="Verde"?"selected":""}>🟢 Verde</option>
  </select>
  <select onchange="F.estado=this.value;renderDash()">
    <option value="activos" ${F.estado==="activos"?"selected":""}>Solo activos</option>
    <option value="all" ${F.estado==="all"?"selected":""}>Todos</option>
    <option value="Abierto" ${F.estado==="Abierto"?"selected":""}>Abierto</option>
    <option value="En curso" ${F.estado==="En curso"?"selected":""}>En curso</option>
    <option value="Esperando" ${F.estado==="Esperando"?"selected":""}>Esperando</option>
    <option value="Cerrado" ${F.estado==="Cerrado"?"selected":""}>Cerrado</option>
  </select>
  <select onchange="F.resp=this.value;renderDash()">
    <option value="all">Todos los responsables</option>
    ${resps.map(r=>`<option value="${esc(r)}" ${F.resp===r?"selected":""}>${esc(r)}</option>`).join("")}
  </select>
</div>

<div style="font-size:12px;color:var(--hint);margin-bottom:8px">${list.length} tickets · click en fila para ver detalle completo</div>

${loading&&tickets.length===0?`<div class="center"><div class="spin"></div>Conectando con Google Sheets…</div>`:`
<div class="twrap">
  <div class="thead">
    <span>ID · Triage</span><span>Descripción</span><span>Estado</span><span>Deadline</span><span>Responsable</span>
  </div>
  ${list.length===0?`<div class="center">Sin tickets con los filtros actuales.</div>`:
    list.map(t=>{
      const tc=tcls(t.triage);
      const dl=dlInfo(t.deadline);
      const isE=expanded===t.id;
      const isV=dl.cls==="v";
      return`<div class="trow${isE?" exp":""}${isV?" venc":""}" onclick="tog('${t.id}')">
  <div><div class="tid">${esc(t.id)}</div><span class="badge ${tc}"><span class="dot"></span>${esc(t.triage)}</span></div>
  <div><div class="tdesc">${esc(t.descripcion)}</div><div class="tarea">${esc(t.area)}${t.deQuien?" · "+esc(t.deQuien):""}</div></div>
  <div><span class="estado">${esc(t.estado)}</span></div>
  <div><span class="dl ${dl.cls}">${esc(dl.lbl)}</span></div>
  <div class="resp">${esc(t.responsable)}</div>
</div>${isE?`<div class="detail">
  <p><strong>Descripción:</strong> ${esc(t.descripcion)}</p>
  ${t.notas?`<div class="nbox"><strong>Notas de cierre:</strong> ${esc(t.notas)}</div>`:""}
  <div class="meta-row">
    <span>📅 Entrada: ${esc(t.fecha)}</span>
    <span>📂 ${esc(t.categoria)}</span>
    <span>📥 Origen: ${esc(t.origen)}</span>
    <span>👤 De quién: ${esc(t.deQuien)}</span>
    ${t.fechaCierre?`<span>✅ Cierre: ${esc(t.fechaCierre)}</span>`:""}
  </div>
</div>`:""}`;
    }).join("")
  }
</div>`}

<div class="footer">Muñoz Marchesi · Sistema de Gestión Operativa</div>`;
}

function tog(id){expanded=expanded===id?null:id;renderDash();}

function jsonp(url){
  return new Promise((ok,fail)=>{
    const cb="mm"+Date.now();
    window[cb]=data=>{delete window[cb];document.head.removeChild(s);ok(data);};
    const s=document.createElement("script");
    s.onerror=()=>{delete window[cb];fail(new Error("Error de red"));};
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.head.appendChild(s);
  });
}

async function load(){
  const url=localStorage.getItem(LS_URL);
  if(!url){renderSetup();return;}
  renderDash(true);
  try{
    const data=await jsonp(url);
    if(!data.ok)throw new Error(data.error||"Error en el script");
    tickets=data.tickets||[];
    const now=new Date().toLocaleString("es-AR");
    localStorage.setItem(LS_TS,now);
    localStorage.setItem(LS_DATA,JSON.stringify(tickets));
    renderDash();
  }catch(e){
    const cache=localStorage.getItem(LS_DATA);
    if(cache){
      tickets=JSON.parse(cache);
      renderDash(false,`Error de conexión: ${e.message}`,`Mostrando datos en caché (${localStorage.getItem(LS_TS)||"hora desconocida"})`);
    }else{
      renderDash(false,`No se pudo conectar: ${e.message} — Verificá que la URL del script sea correcta y que esté desplegado.`);
    }
  }
}

async function connect(){
  const u=(g("uIn").value||"").trim();
  if(!u.includes("script.google.com")){alert("Pegá una URL válida de Google Apps Script (debe incluir script.google.com)");return;}
  localStorage.setItem(LS_URL,u);
  await load();
}

// Init
(()=>{
  const url=localStorage.getItem(LS_URL);
  if(!url){renderSetup();return;}
  const cache=localStorage.getItem(LS_DATA);
  if(cache)tickets=JSON.parse(cache);
  renderDash(true);
  load();
})();
</script>
</body>
</html>
